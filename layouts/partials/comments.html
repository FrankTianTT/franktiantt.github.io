{{ if .Site.Params.giscus.repo }}
{{ $lang := .Site.Language.Lang }}
<script>
  let giscusTheme = "light";
  const savedTheme = localStorage.getItem("pref-theme");
  if (savedTheme === "dark") {
    giscusTheme = "dark_dimmed";
  }
  const giscusLang = {{ $lang }} === "zh" ? "zh-CN" : "en";

  const script = document.createElement("script");
  script.src = "https://giscus.app/client.js";
  script.setAttribute("data-repo", "{{ .Site.Params.giscus.repo }}");
  script.setAttribute("data-repo-id", "{{ .Site.Params.giscus.repoId }}");
  script.setAttribute("data-category", "{{ .Site.Params.giscus.category }}");
  script.setAttribute("data-category-id", "{{ .Site.Params.giscus.categoryId }}");
  script.setAttribute("data-mapping", "{{ .Site.Params.giscus.mapping }}");
  script.setAttribute("data-reactions-enabled", "1");
  script.setAttribute("data-emit-metadata", "0");
  script.setAttribute("data-input-position", "bottom");
  script.setAttribute("data-theme", giscusTheme);
  script.setAttribute("data-lang", giscusLang);
  script.setAttribute("crossorigin", "anonymous");
  script.async = true;

  document.getElementById("comments").appendChild(script);

  document.addEventListener("onchange", function(e) {
    if (e.target && e.target.id === "theme-toggle") {
      const newTheme = document.documentElement.classList.contains("dark") ? "dark_dimmed" : "light";
      const iframe = document.querySelector(".giscus-frame");
      if (iframe) {
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: newTheme } } },
          "https://giscus.app"
        );
      }
    }
  });
</script>
{{ end }}
